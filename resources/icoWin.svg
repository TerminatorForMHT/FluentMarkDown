<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 文档正面渐变（蓝色调，参考记事本风格） -->
    <linearGradient id="docFront" x1="200" y1="120" x2="820" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.4" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <!-- 文档底部厚度（深色，3D） -->
    <linearGradient id="docBottom" x1="200" y1="780" x2="820" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0369A1"/>
      <stop offset="1" stop-color="#075985"/>
    </linearGradient>
    <!-- 文档底部装饰条 -->
    <linearGradient id="bottomStrip" x1="200" y1="760" x2="820" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0F9FF"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <!-- 折角 -->
    <linearGradient id="foldGrad" x1="640" y1="120" x2="820" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BAE6FD"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <!-- 字标渐变 -->
    <linearGradient id="ink" x1="280" y1="380" x2="660" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C4A6E"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="arrow" x1="640" y1="400" x2="640" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C4A6E"/>
      <stop offset="1" stop-color="#164E63"/>
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="125%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0C4A6E" flood-opacity="0.35"/>
    </filter>
    <!-- 折角阴影 -->
    <filter id="foldShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="-4" dy="4" stdDeviation="6" flood-color="#075985" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景：完全透明（Windows Fluent Design 规范） -->

  <!-- ============== 3D 文档主体 ============== -->
  <g filter="url(#shadow)">
    <!-- 底部厚度层（向下偏移形成 3D） -->
    <path d="M196 220C196 178 230 144 272 144H598C622 144 644 154 660 170L800 310C816 326 826 348 826 372V790C826 832 792 866 750 866H272C230 866 196 832 196 790V220Z"
      transform="translate(8, 18)"
      fill="url(#docBottom)"/>

    <!-- 底部白色装饰条（类似记事本底部的浅色条） -->
    <path d="M196 730V790C196 832 230 866 272 866H750C792 866 826 832 826 790V730H196Z"
      fill="url(#bottomStrip)"/>

    <!-- 文档正面 -->
    <path d="M196 220C196 178 230 144 272 144H598C622 144 644 154 660 170L800 310C816 326 826 348 826 372V730H196V220Z"
      fill="url(#docFront)"/>

    <!-- 正面顶部高光 -->
    <path d="M220 220C220 190 244 168 272 168H580C610 168 636 200 636 200L246 200C230 200 220 210 220 220Z"
      fill="#FFFFFF" fill-opacity="0.3"/>

    <!-- 折角 -->
    <g filter="url(#foldShadow)">
      <path d="M598 144V300C598 336 626 364 662 364H826L598 144Z"
        fill="url(#foldGrad)"/>
      <path d="M598 144V300C598 336 626 364 662 364H826"
        fill="none" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.5"/>
    </g>

    <!-- 文档边框高光 -->
    <path d="M272 150H598C620 150 641 159 656 174L796 314C811 329 820 350 820 372V790C820 828 789 860 750 860H272C234 860 202 828 202 790V220C202 182 234 150 272 150Z"
      fill="none" stroke="#FFFFFF" stroke-width="5" stroke-opacity="0.35"/>
  </g>

  <!-- ============== "M ↓" 字标 ============== -->
  <!-- M -->
  <path d="M290 620V440C290 428 300 418 312 418H340C350 418 360 424 366 432L448 548L530 432C536 424 546 418 556 418H584C596 418 606 428 606 440V620C606 632 596 642 584 642H570C558 642 548 632 548 620V506L496 586C490 594 482 598 474 598C466 598 458 594 452 586L398 502V620C398 632 388 642 376 642H362C350 642 340 632 340 620Z"
    fill="url(#ink)"/>

  <!-- 箭头 ↓ -->
  <g fill="url(#arrow)">
    <rect x="662" y="418" width="44" height="138" rx="22"/>
    <path d="M684 648L610 560C604 552 609 540 620 540H748C759 540 764 552 758 560L684 648Z"/>
  </g>

  <!-- ============== 底部文本行装饰 ============== -->
  <g opacity="0.3">
    <rect x="290" y="686" width="300" height="14" rx="7" fill="#0C4A6E"/>
    <rect x="290" y="716" width="220" height="14" rx="7" fill="#0C4A6E"/>
  </g>
</svg>
