<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1976D2"/>
      <stop offset="0.5" stop-color="#3949AB"/>
      <stop offset="1" stop-color="#6A1B9A"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(300 260) scale(700)">
      <stop offset="0" stop-color="#64B5F6" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#42A5F5" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="docFace" x1="300" y1="200" x2="760" y2="840" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#DCEAFF" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="ink" x1="360" y1="400" x2="720" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A237E"/>
      <stop offset="1" stop-color="#4A148C"/>
    </linearGradient>
    <linearGradient id="arrow" x1="680" y1="420" x2="680" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2979FF"/>
      <stop offset="1" stop-color="#7C4DFF"/>
    </linearGradient>
    <filter id="ds" x="-8%" y="-4%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- 圆角矩形背景（macOS 规范：80% 画布 + 22.5% 圆角） -->
  <rect x="96" y="96" width="832" height="832" rx="210" ry="210" fill="url(#bgBase)"/>
  <rect x="96" y="96" width="832" height="832" rx="210" ry="210" fill="url(#bgGlow)"/>

  <!-- 装饰点 -->
  <g opacity="0.45" fill="#FFF">
    <circle cx="860" cy="160" r="5"/>
    <circle cx="900" cy="230" r="7"/>
    <circle cx="815" cy="215" r="3.5"/>
    <circle cx="940" cy="290" r="4"/>
  </g>

  <!-- 左下角 </> 符号 -->
  <g opacity="0.18" fill="none" stroke="#FFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="150,840 105,885 150,930"/>
    <polyline points="245,840 290,885 245,930"/>
    <line x1="215" y1="818" x2="180" y2="950"/>
  </g>

  <!-- 玻璃文档 -->
  <g filter="url(#ds)">
    <path d="M300 250C300 222 320 202 348 202H600C618 202 634 209 646 221L748 323C760 335 768 352 768 370V740C768 768 748 788 720 788H348C320 788 300 768 300 740V250Z"
      fill="url(#docFace)"/>
    <path d="M600 202V310C600 336 620 356 646 356H748L600 202Z"
      fill="#FFFFFF" fill-opacity="0.65"/>
    <path d="M348 208H600C616 208 632 214 643 225L745 327C756 338 762 354 762 370V740C762 764 742 784 720 784H348C326 784 306 764 306 740V250C306 226 326 208 348 208Z"
      fill="none" stroke="#FFFFFF" stroke-width="7" stroke-opacity="0.55"/>
  </g>

  <!-- M 字母 -->
  <path d="M350 640V430C350 418 360 408 372 408H396C406 408 414 413 420 421L492 530L564 421C570 413 578 408 588 408H612C624 408 634 418 634 430V640C634 652 624 662 612 662H600C588 662 578 652 578 640V510L524 598C519 605 512 610 504 610C496 610 489 605 484 598L426 506V640C426 652 416 662 404 662H392C380 662 370 652 370 640Z"
    fill="url(#ink)"/>

  <!-- 箭头 ↓ -->
  <g fill="url(#arrow)">
    <rect x="680" y="408" width="44" height="156" rx="22"/>
    <path d="M702 664L622 570C616 562 621 550 632 550H772C783 550 788 562 782 570L702 664Z"/>
  </g>

  <!-- 底部文本行 -->
  <g opacity="0.38">
    <rect x="354" y="700" width="300" height="15" rx="7.5" fill="#1A237E"/>
    <rect x="354" y="732" width="225" height="15" rx="7.5" fill="#1A237E"/>
    <rect x="354" y="764" width="155" height="15" rx="7.5" fill="#1A237E"/>
  </g>

  <!-- 圆角矩形边框高光 -->
  <rect x="98" y="98" width="828" height="828" rx="208" ry="208"
    fill="none" stroke="#FFF" stroke-opacity="0.15" stroke-width="3"/>
</svg>
